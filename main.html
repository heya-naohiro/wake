<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>wake lock</title>
</head>
<body>
    <header>wake lock</header>
    <main>
        <p id="status">Wake Lock is inactive</p>
        <button onclick="startWakeLock()">Start Wake Lock</button>
        <button onclick="stopWakeLock()">Stop Wake Lock</button>
    </main>
    <footer></footer>
    <script>
        let wakeLock = null;
        let shouldMaintainWakeLock = false;

        async function startWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                shouldMaintainWakeLock = true;
                document.getElementById('status').textContent = 'Wake Lock is active';
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
                document.getElementById('status').textContent = `Error: ${err.message}`;
            }
        }

        async function stopWakeLock() {
            if (wakeLock) {
                await wakeLock.release();
                wakeLock = null;
                shouldMaintainWakeLock = false;
                document.getElementById('status').textContent = 'Wake Lock is inactive';
            }
        }

        // バックグラウンド復帰時に自動で再掛け
        document.addEventListener('visibilitychange', async () => {
            if (!document.hidden && shouldMaintainWakeLock && !wakeLock) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.getElementById('status').textContent = 'Wake Lock is active (restored)';
                } catch (err) {
                    console.error(`Failed to restore Wake Lock: ${err.message}`);
                }
            }
        });
    </script>
</body>
</html>
